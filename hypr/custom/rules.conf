# You can put custom rules here
# Window/layer rules: https://wiki.hyprland.org/Configuring/Window-Rules/
# Workspace rules: https://wiki.hyprland.org/Configuring/Workspace-Rules/

# ######## Window rules ########

# Global glassmorphism transparency for all windows
windowrule = opacity 0.92 override 0.85 override, match:class .*

# Full opacity for media/games/fullscreen
windowrule = opacity 1.0 override 1.0 override, match:class ^(mpv)$
windowrule = opacity 1.0 override 1.0 override, match:class ^(vlc)$
windowrule = opacity 1.0 override 1.0 override, match:class ^(steam_app).*$
windowrule = opacity 1.0 override 1.0 override, match:fullscreen 1

# Disable blur for xwayland apps (optional - comment out to enable blur for xwayland too)
# windowrule = no_blur on, match:xwayland 1
